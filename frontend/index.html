<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/JusticeLinker-favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="maGhfEKddidKKHF9TjNHvaZQzWWssGSxENxptqRa4YI" />
  
  <!-- SEO Meta Description -->
  <meta name="description"
    content="JusticeLinker - Linking Courage to Justice. Report harassment and injustice in Andhra Pradesh." />

  <!-- Page Title -->
  <title>JusticeLinker | Independent Grievance Reporting Platform</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Telugu:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- JSON-LD Structured Data for Google -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "JusticeLinker",
    "url": "https://justicelinker.vercel.app/",
    "logo": "https://justicelinker.vercel.app/JusticeLinker-favicon.png",
    "description": "JusticeLinker is an independent grievance reporting platform built to help citizens of Andhra Pradesh raise concerns about harassment, corruption, civic issues, and injustice.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://justicelinker.vercel.app/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "JusticeLinker",
    "url": "https://justicelinker.vercel.app/",
    "logo": "https://justicelinker.vercel.app/JusticeLinker-favicon.png"
  }
  </script>

  <!-- Open Graph for Rich Search Snippets -->
  <meta property="og:title" content="JusticeLinker | Independent Grievance Reporting Platform" />
  <meta property="og:description" content="Linking Courage to Justice. Report harassment and injustice in Andhra Pradesh." />
  <meta property="og:image" content="https://justicelinker.vercel.app/JusticeLinker-favicon.png" />
  <meta property="og:url" content="https://justicelinker.vercel.app/" />
  <meta property="og:type" content="website" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
