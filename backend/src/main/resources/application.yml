spring:
  application:
    name: JusticeLinker

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/justicelinker?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:YOUR_LOCAL_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB

jwt:
  secret: ${JWT_SECRET:JusticeLinkerSecretKeyForJWTTokenGeneration2026MustBeAtLeast256Bits}
  expiration: 86400000

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:YOUR_CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY:YOUR_CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET:YOUR_CLOUDINARY_API_SECRET}

brevo:
  api-key: ${BREVO_API_KEY}

app:
  max-complaints-per-month: 5
  admin-passphrase: ${ADMIN_PASSPHRASE:JusticeLinkerDefaultPassphrase}
  max-images-per-complaint: 3
  max-image-size-mb: 5
  otp-expiry-minutes: 5
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  noreply-email: justicelinker.noreply@gmail.com
  support-email: justicelinker.official@gmail.com

rate-limit:
  otp:
    requests-per-hour: 5
    wrong-attempts-max: 3
    lockout-duration-minutes: 30
    failed-attempts-ttl-hours: 1

server:
  port: ${PORT:8080}
